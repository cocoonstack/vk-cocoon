apiVersion: v1
kind: Pod
metadata:
  name: windows-vm
  namespace: default
  labels:
    app: windows-vm
    os: windows
  annotations:
    cocoonset.cocoonstack.io/mode: "run"
    cocoonset.cocoonstack.io/image: "https://registry.example.com/win11-base"
    cocoonset.cocoonstack.io/os: "windows"
    cocoonset.cocoonstack.io/storage: "15G"
    cocoonset.cocoonstack.io/managed: "true"
spec:
  nodeName: cocoon-pool
  tolerations:
    - key: "virtual-kubelet.io/provider"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: windows
      image: https://registry.example.com/win11-base
      ports:
        - containerPort: 3389
          name: rdp
          protocol: TCP
      resources:
        limits:
          cpu: "2"
          memory: "4Gi"
